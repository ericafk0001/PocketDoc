<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PocketDoc Topic Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body
    class="min-h-dvh bg-[#eceef2] p-4 text-[#181a21] flex items-center justify-center"
  >
    <div
      class="w-full max-w-[430px] h-[min(932px,calc(100dvh-32px))] rounded-[30px] sm:rounded-[34px] border border-[#d9dee8] bg-[#f7f8fa] shadow-[0_16px_46px_rgba(12,27,61,0.12)] relative overflow-hidden flex flex-col"
    >
      <div class="px-4 py-4 border-b border-[#e3e7ee] bg-[#f7f8fa]">
        <div class="flex items-center justify-between">
          <a
            href="index.html"
            class="inline-flex items-center gap-2 rounded-full bg-white px-4 py-2 text-sm font-semibold text-[#2f7af6] shadow-sm border border-[#e3e7ee]"
          >
            <i class="bi bi-arrow-left"></i>
            Back
          </a>
          <div class="text-right">
            <div
              class="text-[13px] uppercase tracking-[0.18em] text-[#7b8391] font-semibold"
            >
              PocketDoc
            </div>
            <div id="topicHeader" class="text-lg font-bold text-[#1f3f78]">
              Topic Guide
            </div>
          </div>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto px-4 py-4 pb-8">
        <section
          class="rounded-[24px] bg-gradient-to-b from-[#2f7af6] to-[#1e56cc] text-white p-5 shadow-[0_18px_35px_rgba(47,122,246,0.24)] mb-4"
        >
          <div class="flex items-center gap-3 mb-3">
            <div
              id="topicIcon"
              class="w-11 h-11 rounded-2xl bg-white/15 grid place-items-center text-xl"
            >
              <i class="bi bi-book"></i>
            </div>
            <div>
              <div class="text-sm/none font-semibold opacity-90">
                PocketDoc topic
              </div>
              <div id="topicTitle" class="text-[22px] font-bold leading-none">
                Wound Care Basics
              </div>
            </div>
          </div>
          <p id="topicSummary" class="text-sm leading-6 text-white/90"></p>
        </section>

        <section
          class="rounded-[22px] border border-[#e3e7ee] bg-white p-4 mb-4"
        >
          <div
            class="text-xs uppercase tracking-[0.18em] text-[#7b8391] font-semibold mb-3"
          >
            What to do
          </div>
          <ul id="topicChecklist" class="space-y-2.5"></ul>
        </section>

        <section
          class="rounded-[22px] border border-[#ffd8d8] bg-[#fff4f4] p-4 mb-4"
        >
          <div
            class="text-xs uppercase tracking-[0.18em] text-[#c65b5b] font-semibold mb-3"
          >
            Seek urgent care now if
          </div>
          <ul id="topicUrgent" class="space-y-2.5"></ul>
        </section>

        <a
          href="ai.html"
          id="askAiLink"
          class="inline-flex w-full items-center justify-center gap-2 rounded-full bg-[#2f7af6] px-4 py-3 text-sm font-bold text-white shadow-[0_10px_20px_rgba(47,122,246,0.22)] transition-transform duration-200 hover:-translate-y-[1px]"
        >
          <i class="bi bi-stars"></i>
          Ask PocketDoc AI about this topic
        </a>
      </div>
    </div>

    <script src="topic.js"></script>
  </body>
</html>
