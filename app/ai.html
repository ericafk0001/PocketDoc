<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PocketDoc AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body
    class="min-h-dvh bg-[#eceef2] p-4 text-[#181a21] flex items-center justify-center"
  >
    <div
      class="w-full max-w-[430px] h-[min(932px,calc(100dvh-32px))] rounded-[30px] sm:rounded-[34px] border border-[#d9dee8] bg-[#f7f8fa] shadow-[0_16px_46px_rgba(12,27,61,0.12)] relative overflow-hidden flex flex-col"
    >
      <div class="px-4 py-4 border-b border-[#e3e7ee] bg-[#f7f8fa]">
        <div class="flex items-center justify-between">
          <a
            href="index.html"
            class="inline-flex items-center gap-2 rounded-full bg-white px-4 py-2 text-sm font-semibold text-[#2f7af6] shadow-sm border border-[#e3e7ee]"
          >
            <i class="bi bi-arrow-left"></i>
            Back
          </a>
          <div class="text-right">
            <div
              class="text-[13px] uppercase tracking-[0.18em] text-[#7b8391] font-semibold"
            >
              PocketDoc AI
            </div>
            <div class="text-lg font-bold text-[#1f3f78]">
              Wound-care chat
            </div>
          </div>
        </div>
      </div>

      <div id="chatContainer" class="flex-1 overflow-y-auto px-4 py-4 pb-28">
        <div
          id="chatIntroCard"
          class="rounded-[24px] bg-gradient-to-b from-[#2f7af6] to-[#1e56cc] text-white p-5 shadow-[0_18px_35px_rgba(47,122,246,0.24)] mb-4"
        >
          <div class="flex items-center gap-3 mb-3">
            <div class="w-11 h-11 rounded-2xl bg-white/15 grid place-items-center text-xl">
              <i class="bi bi-stars"></i>
            </div>
            <div>
              <div class="text-sm/none font-semibold opacity-90">PocketDoc AI</div>
              <div class="text-[22px] font-bold leading-none">Ask anything about wound care</div>
            </div>
          </div>
          <p class="text-sm leading-6 text-white/90">
            For severe bleeding, trouble breathing, chest pain, fainting, or rapidly worsening symptoms, seek urgent in-person care.
          </p>
        </div>

        <div id="suggestedPrompts" class="rounded-[22px] border border-[#e3e7ee] bg-white p-4 mb-4">
          <div class="text-xs uppercase tracking-[0.18em] text-[#7b8391] font-semibold mb-3">Suggested prompts</div>
          <div class="grid gap-2">
            <button class="prompt-chip rounded-full bg-[#edf3ff] px-4 py-3 text-left text-sm font-semibold text-[#1f3f78]">How do I clean this wound safely at home?</button>
            <button class="prompt-chip rounded-full bg-[#edf3ff] px-4 py-3 text-left text-sm font-semibold text-[#1f3f78]">What signs mean this could be infected?</button>
            <button class="prompt-chip rounded-full bg-[#edf3ff] px-4 py-3 text-left text-sm font-semibold text-[#1f3f78]">When should I stop home care and see a doctor?</button>
          </div>
        </div>

        <div id="chatMessages" class="space-y-3"></div>

        <div id="chatError" class="hidden mt-3 rounded-xl bg-[#ffe5e5] text-[#d32f2f] px-3 py-2.5 text-sm"></div>
      </div>

      <form id="chatForm" class="absolute left-3 right-3 bottom-3 sm:left-4 sm:right-4 sm:bottom-4 rounded-[20px] border border-[#dbe3f3] bg-white p-2.5 shadow-[0_10px_25px_rgba(15,23,42,0.12)] flex items-end gap-2">
        <textarea
          id="chatInput"
          rows="1"
          maxlength="2000"
          placeholder="Ask about symptoms, cleaning, dressings, or warning signs"
          class="flex-1 resize-none max-h-32 bg-transparent outline-none px-2 py-2 text-[15px] text-[#1b2430] placeholder:text-[#8b94a3]"
        ></textarea>
        <button id="sendBtn" type="submit" class="rounded-full bg-[#2f7af6] px-4 py-2.5 text-sm font-bold text-white shadow-[0_8px_20px_rgba(47,122,246,0.2)]">Send</button>
      </form>
    </div>

    <style>
      .assistant-content p {
        margin: 0.4rem 0;
      }
      .assistant-content h1,
      .assistant-content h2,
      .assistant-content h3,
      .assistant-content h4 {
        margin-top: 0.6rem;
        margin-bottom: 0.35rem;
        font-weight: 700;
        color: #1f3f78;
      }
      .assistant-content ul,
      .assistant-content ol {
        margin: 0.35rem 0 0.35rem 1.1rem;
      }
      .assistant-content ul {
        list-style: disc;
      }
      .assistant-content ol {
        list-style: decimal;
      }
      .assistant-content li {
        margin: 0.2rem 0;
      }
      .assistant-content strong {
        font-weight: 700;
      }
    </style>

    <script src="ai.js"></script>
  </body>
</html>
